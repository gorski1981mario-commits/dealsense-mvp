<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code - Camera Test</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
      padding: 20px;
      margin: 0;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 500px;
    }
    h1 {
      color: #15803d;
      margin-bottom: 20px;
      font-size: 24px;
    }
    .qr-code {
      margin: 30px 0;
      padding: 20px;
      background: white;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      display: inline-block;
    }
    .url {
      background: #f9fafb;
      padding: 16px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 12px;
      word-break: break-all;
      color: #374151;
      margin: 20px 0;
    }
    .instruction {
      color: #6b7280;
      font-size: 14px;
      line-height: 1.6;
      margin-top: 20px;
    }
    .instruction strong {
      color: #15803d;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📱 Scan QR Code</h1>
    <p style="color: #6b7280; margin-bottom: 20px;">Zeskanuj ten kod na telefonie</p>
    
    <div class="qr-code">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://dealsense-3akb9im08-dealsensenls-projects.vercel.app" alt="QR Code" width="300" height="300">
    </div>
    
    <div class="url">
      https://dealsense-3akb9im08-dealsensenls-projects.vercel.app
    </div>
    
    <div class="instruction">
      <strong>Instrukcja:</strong><br>
      1. Zeskanuj QR code swoim telefonem<br>
      2. Otwórz link w przeglądarce<br>
      3. Kliknij "Scan Barcode/QR"<br>
      4. Sprawdź czy kamera się uruchamia<br>
      5. Pokaż mi screenshot jeśli nie działa
    </div>
  </div>
</body>
</html>
