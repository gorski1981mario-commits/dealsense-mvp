<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="white" rx="80"/>
  
  <!-- Ghost Mode logo - zielone przekreślone oko (EyeOff) -->
  <g transform="translate(256, 256)">
    <!-- Oko (elipsa) -->
    <path d="M -80 0 Q -80 -40 0 -40 Q 80 -40 80 0 Q 80 40 0 40 Q -80 40 -80 0 Z" 
          fill="none" 
          stroke="#15803d" 
          stroke-width="12"/>
    
    <!-- Źrenica -->
    <circle cx="0" cy="0" r="20" fill="#15803d"/>
    
    <!-- Przekreślenie (linia przez oko) -->
    <line x1="-100" y1="-60" x2="100" y2="60" 
          stroke="#15803d" 
          stroke-width="12" 
          stroke-linecap="round"/>
  </g>
</svg>
