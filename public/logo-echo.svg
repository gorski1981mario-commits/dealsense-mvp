<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="white" rx="80"/>
  
  <!-- Logo Echo - E (zielone) + ch (niebieskie) + ● (czarne kółko) -->
  <!-- Wycentrowane w kadrze, wszystkie litery na baseline -->
  <text x="256" y="300" font-family="system-ui, -apple-system, sans-serif" font-weight="700" text-anchor="middle">
    <tspan font-size="280" fill="#15803d">E</tspan><tspan font-size="240" fill="#3b82f6">ch</tspan><tspan font-size="260" fill="#000000">●</tspan>
  </text>
</svg>
