services:
  - type: web
    name: dealsense-kwant-backend
    env: node
    region: frankfurt
    plan: free
    rootDirectory: server
    buildCommand: npm install
    startCommand: node server-simple.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: USE_MOCK_FALLBACK
        value: false
      - key: MARKET_LOG_SILENT
        value: 0
      - key: MARKET_DISK_CACHE_ENABLED
        value: 1
      # CRAWLER WYŁĄCZONY - używamy Google Shopping API
      - key: USE_OWN_CRAWLER
        value: false
      # GOOGLE SHOPPING API - dodaj swój klucz w Render dashboard
      # - key: GOOGLE_SHOPPING_API_KEY
      #   value: [TWÓJ_KLUCZ_TUTAJ]
    healthCheckPath: /health
