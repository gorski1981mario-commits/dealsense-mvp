<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DealSense Interactive Demo Preview</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
      padding: 40px 20px;
      min-height: 100vh;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .demo-section {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }
    
    .demo-header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .demo-header h2 {
      font-size: 32px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 12px;
    }
    
    .demo-header p {
      font-size: 16px;
      color: #6b7280;
    }
    
    /* Package Tabs */
    .package-tabs {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }
    
    .tab-button {
      padding: 12px 24px;
      border: 2px solid #e5e7eb;
      background: white;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #6b7280;
    }
    
    .tab-button:hover {
      border-color: #15803d;
      transform: translateY(-2px);
    }
    
    .tab-button.active {
      background: #15803d;
      color: white;
      border-color: #15803d;
    }
    
    /* Demo Content */
    .demo-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: center;
    }
    
    @media (max-width: 768px) {
      .demo-content {
        grid-template-columns: 1fr;
      }
    }
    
    /* Phone Mockup */
    .phone-mockup {
      position: relative;
      width: 100%;
      max-width: 320px;
      margin: 0 auto;
      aspect-ratio: 9/19.5;
      background: #1f2937;
      border-radius: 40px;
      padding: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    .phone-screen {
      width: 100%;
      height: 100%;
      background: white;
      border-radius: 32px;
      overflow: hidden;
      position: relative;
    }
    
    .phone-notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 24px;
      background: #1f2937;
      border-radius: 0 0 20px 20px;
      z-index: 10;
    }
    
    .screen-content {
      padding: 40px 20px 20px;
      height: 100%;
      overflow-y: auto;
    }
    
    /* Steps */
    .steps-container {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    
    .step {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      opacity: 0;
      transform: translateX(-20px);
      animation: slideIn 0.5s ease forwards;
    }
    
    .step:nth-child(1) { animation-delay: 0.1s; }
    .step:nth-child(2) { animation-delay: 0.3s; }
    .step:nth-child(3) { animation-delay: 0.5s; }
    .step:nth-child(4) { animation-delay: 0.7s; }
    
    @keyframes slideIn {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    .step-number {
      min-width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #15803d, #16a34a);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      box-shadow: 0 4px 12px rgba(21, 128, 61, 0.3);
    }
    
    .step-content h3 {
      font-size: 18px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 6px;
    }
    
    .step-content p {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.6;
    }
    
    .step-badge {
      display: inline-block;
      padding: 4px 12px;
      background: #dcfce7;
      color: #15803d;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 8px;
    }
    
    /* Screen Animation */
    .scan-animation {
      text-align: center;
      padding: 20px;
    }
    
    .qr-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, #15803d, #16a34a);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    .scan-text {
      font-size: 14px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 8px;
    }
    
    .scan-subtext {
      font-size: 12px;
      color: #6b7280;
    }
    
    .results-preview {
      margin-top: 20px;
      padding: 12px;
      background: #f9fafb;
      border-radius: 8px;
    }
    
    .result-item {
      padding: 8px;
      background: white;
      border-radius: 6px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
    }
    
    .result-item:last-child {
      margin-bottom: 0;
    }
    
    .price {
      font-weight: 700;
      color: #15803d;
    }
    
    /* Package Features */
    .package-features {
      margin-top: 20px;
      padding: 16px;
      background: #f0fdf4;
      border-radius: 12px;
      border: 2px solid #86efac;
    }
    
    .feature-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 13px;
      color: #111827;
    }
    
    .feature-item:last-child {
      margin-bottom: 0;
    }
    
    .feature-icon {
      color: #15803d;
      font-weight: 700;
    }
  </style>
</head>
<body>

      <!-- Demo Content -->

          <div class="phone-screen">
            <div class="screen-content" id="screenContent">

          </div>
        </div>
        
        <!-- Steps -->
        <div class="steps-container" id="stepsContainer">

    };
    
    function showPackage(packageName) {
      // Update active tab
      document.querySelectorAll('.tab-button').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');
      
      // Get package data
      const pkg = packages[packageName];
      
      // Update screen content
      document.getElementById('screenContent').innerHTML = pkg.screen;
      
      // Update steps
      const stepsHTML = pkg.steps.map((step, index) => `
        <div class="step">
          <div class="step-number">${index + 1}</div>
          <div class="step-content">
            <h3>${step.title}</h3>
            <p>${step.description}</p>
            <span class="step-badge">${step.badge}</span>
          </div>
        </div>
      `).join('');
      
      document.getElementById('stepsContainer').innerHTML = stepsHTML;
    }
    
    // Initialize with FREE package
    showPackage('free');
  </script>
</body>
</html>
